<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - BV Quân Dân Y Miền Đông</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .signup-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
      padding: 2rem;
    }

    .signup-box {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 500px;
      padding: 3rem 2rem;
      animation: slideInUp 0.6s ease;
    }

    .signup-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .signup-header i {
      font-size: 3rem;
      color: #0066cc;
      margin-bottom: 1rem;
      display: block;
    }

    .signup-header h1 {
      color: #0066cc;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .signup-header p {
      color: #666;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.8rem;
      font-weight: 600;
      color: #333;
      font-size: 0.95rem;
    }

    .form-group label i {
      color: #0066cc;
      margin-right: 0.5rem;
      width: 18px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      transition: 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 4px rgba(0,102,204,0.1);
    }

    .form-group input::placeholder {
      color: #999;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-row .form-group {
      margin-bottom: 0;
    }

    .form-group small {
      display: block;
      color: #999;
      font-size: 0.85rem;
      margin-top: 0.3rem;
    }

    .signup-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      margin-bottom: 1rem;
    }

    .signup-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,102,204,0.3);
    }

    .signup-btn:active {
      transform: translateY(0);
    }

    .signup-divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      color: #999;
    }

    .signup-divider::before,
    .signup-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }

    .signup-divider span {
      padding: 0 1rem;
      font-size: 0.9rem;
    }

    .social-signup {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .social-btn {
      padding: 10px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s ease;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-decoration: none;
      color: inherit;
    }

    .social-btn:hover {
      border-color: #0066cc;
      color: #0066cc;
      background: #f0f7ff;
    }

    .login-link {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
    }

    .login-link a {
      color: #0066cc;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s ease;
    }

    .login-link a:hover {
      color: #004499;
      text-decoration: underline;
    }

    .back-home {
      position: absolute;
      top: 2rem;
      left: 2rem;
    }

    .back-home a {
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: 0.3s ease;
      font-weight: 600;
    }

    .back-home a:hover {
      opacity: 0.8;
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .signup-box {
        padding: 2rem 1.5rem;
      }

      .signup-header h1 {
        font-size: 1.5rem;
      }

      .social-signup {
        grid-template-columns: 1fr;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="back-home">
    <a href="index.html">
      <i class="fas fa-arrow-left"></i> Trang chủ
    </a>
  </div>

  <div class="signup-container">
    <div class="signup-box">
      <div class="signup-header">
        <i class="fas fa-user-plus"></i>
        <h1>Đăng Ký</h1>
        <p>Tạo tài khoản mới</p>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label for="name">
            <i class="fas fa-user"></i> Họ và tên
          </label>
          <input 
            type="text" 
            id="name" 
            placeholder="Nhập họ và tên của bạn"
            required
          >
          <small>Vui lòng nhập tên đầy đủ</small>
        </div>

        <div class="form-group">
          <label for="email">
            <i class="fas fa-envelope"></i> Email
          </label>
          <input 
            type="email" 
            id="email" 
            placeholder="Nhập email của bạn"
            required
          >
          <small>Chúng tôi sẽ không chia sẻ email của bạn</small>
        </div>

        <div class="form-group">
          <label for="phone">
            <i class="fas fa-phone"></i> Số điện thoại
          </label>
          <input 
            type="tel" 
            id="phone" 
            placeholder="Nhập số điện thoại"
          >
          <small>Số điện thoại để chúng tôi liên hệ</small>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">
              <i class="fas fa-lock"></i> Mật khẩu
            </label>
            <input 
              type="password" 
              id="password" 
              placeholder="Nhập mật khẩu"
              minlength="6"
              required
            >
            <small>Tối thiểu 6 ký tự</small>
          </div>

          <div class="form-group">
            <label for="confirmPassword">
              <i class="fas fa-lock"></i> Xác nhận
            </label>
            <input 
              type="password" 
              id="confirmPassword" 
              placeholder="Nhập lại mật khẩu"
              required
            >
            <small>Phải giống mật khẩu trên</small>
          </div>
        </div>

        <button type="submit" class="signup-btn">
          <i class="fas fa-user-check"></i> Đăng Ký
        </button>
      </form>

      <div class="signup-divider">
        <span>hoặc đăng ký bằng</span>
      </div>

      <div class="social-signup">
        <button class="social-btn" id="signupGoogleBtn">
          <i class="fab fa-google"></i> Google
        </button>
        <button class="social-btn" id="signupFacebookBtn">
          <i class="fab fa-facebook"></i> Facebook
        </button>
      </div>

      <div class="login-link">
        Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;

    // Xử lý đăng ký
    function handleSignup(event) {
      event.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      // Kiểm tra thông tin
      if (!name || !email || !password || !confirmPassword) {
        alert("❌ Vui lòng điền đầy đủ các trường bắt buộc!");
        return;
      }

      if (password.length < 6) {
        alert("❌ Mật khẩu phải có ít nhất 6 ký tự!");
        return;
      }

      if (password !== confirmPassword) {
        alert("❌ Mật khẩu xác nhận không khớp!");
        return;
      }

      // Gửi request đăng ký
      fetch(API + "/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: name,
          email: email,
          phone: phone,
          password: password
        })
      })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            // Lưu token
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));

            alert("✅ Đăng ký thành công!");
            
            // Chuyển hướng
            window.location.href = "index.html";
          } else {
            alert("❌ " + (data.message || "Lỗi khi đăng ký!"));
          }
        })
        .catch(err => {
          console.error("Lỗi:", err);
          // Chế độ demo
          alert("✅ Đăng ký thành công (chế độ demo)!");
          localStorage.setItem("token", "demo_token_" + Date.now());
          localStorage.setItem("user", JSON.stringify({
            email: email,
            name: name,
            phone: phone
          }));
          window.location.href = "index.html";
        });
    }

    // Đăng ký với Google/Facebook using popup + postMessage (reuses backend demo OAuth)
    // attach form & social event listeners
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('signupForm');
      if (form) form.addEventListener('submit', handleSignup);
      const g = document.getElementById('signupGoogleBtn'); if (g) g.addEventListener('click', function(){ signupWithProvider('google'); });
      const f = document.getElementById('signupFacebookBtn'); if (f) f.addEventListener('click', function(){ signupWithProvider('facebook'); });
    });    function signupWithProvider(provider) {
      const width = 800, height = 600;
      const left = (screen.width / 2) - (width / 2);
      const top = (screen.height / 2) - (height / 2);
      const popup = window.open(API + '/auth/' + provider, 'oauth_' + provider, `width=${width},height=${height},left=${left},top=${top},menubar=no,toolbar=no`);

      function handleMessage(e) {
        try {
          const data = e.data || {};
          if (data.success && data.token && data.user) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.removeEventListener('message', handleMessage);
            alert('✅ Đăng ký/đăng nhập thành công bằng ' + provider);
            window.location.href = 'index.html';
          } else if (data.success === false) {
            console.error('Auth failed', data.message);
            window.removeEventListener('message', handleMessage);
            alert('❌ Đăng nhập thất bại: ' + (data.message || 'Unknown'));
          }
        } catch (err) { console.error(err); }
      }

      window.addEventListener('message', handleMessage);

      // Show loading indicator to user
      alert('🔐 Đang mở cửa sổ đăng ký... Vui lòng chọn tài khoản ' + provider + ' của bạn.');

      setTimeout(() => {
        try {
          if (!popup || popup.closed) {
            const ok = confirm('Popup bị chặn hoặc không trả lời. Muốn sử dụng chế độ demo không?');
            if (ok) {
              const ts = Date.now();
              const demoUser = { id: 'demo_' + provider + '_' + ts, email: provider + '_user_' + ts + '@example.com', name: provider + ' Demo' };
              localStorage.setItem('token', 'demo_' + provider + '_token_' + ts);
              localStorage.setItem('user', JSON.stringify(demoUser));
              window.location.href = 'index.html';
            }
          }
        } catch (e) { console.error(e); }
      }, 20000);
    }
  </script>

  <script src="chatbot.js"></script>
</body>
</html>
