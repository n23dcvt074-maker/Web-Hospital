<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch hẹn bệnh nhân - WebHopital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-hospital"></i>
                <span>WebHopital</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Trang chủ</a>
                <a href="doctors.html" class="nav-link">Bác sĩ</a>
                <a href="about.html" class="nav-link">Giới thiệu</a>
                <div class="nav-auth">
                    <button class="btn-login" id="userMenuBtn">
                        <i class="fas fa-user-circle"></i> Tài khoản
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-calendar-check"></i> Lịch hẹn bệnh nhân</h1>
            <p>Quản lý các lịch hẹn khám bệnh của bạn</p>
        </div>

        <div class="appointments-section">
            <div class="section-header">
                <h2>Danh sách lịch hẹn</h2>
                <div class="filter-buttons">
                    <button class="btn-filter active" data-filter="all">Tất cả</button>
                    <button class="btn-filter" data-filter="pending">Chờ xác nhận</button>
                    <button class="btn-filter" data-filter="confirmed">Đã xác nhận</button>
                    <button class="btn-filter" data-filter="completed">Đã hoàn thành</button>
                    <button class="btn-filter" data-filter="cancelled">Đã hủy</button>
                </div>
            </div>

            <div id="appointments-list" class="appointments-list">
                <!-- Appointments will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Modal for appointment details -->
    <div id="appointment-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Chi tiết lịch hẹn</h3>
                <span class="modal-close" id="modalCloseBtn">&times;</span>
            </div>
            <div id="appointment-details" class="modal-body">
                <!-- Appointment details will be loaded here -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="modalCloseAction">Đóng</button>
                <button id="confirm-btn" class="btn-primary">Xác nhận</button>
                <button id="cancel-btn" class="btn-danger">Hủy lịch</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        let currentFilter = 'all';
        let appointments = [];

        // Load appointments when page loads
        document.addEventListener('DOMContentLoaded', function() {
            updateNavbarAuth();
            loadDoctorAppointments();

            const userBtn = document.getElementById('userMenuBtn');
            if (userBtn) {
                userBtn.addEventListener('click', showUserMenu);
            }

            document.querySelectorAll('.filter-buttons .btn-filter').forEach(btn => {
                btn.addEventListener('click', () => {
                    const f = btn.dataset.filter;
                    if (f) filterAppointments(f);
                });
            });

            const modalClose = document.getElementById('modalCloseBtn');
            if (modalClose) modalClose.addEventListener('click', closeModal);
            const modalCloseAction = document.getElementById('modalCloseAction');
            if (modalCloseAction) modalCloseAction.addEventListener('click', closeModal);
            const confirmBtn = document.getElementById('confirm-btn');
            if (confirmBtn) confirmBtn.addEventListener('click', confirmAppointment);
            const cancelBtn = document.getElementById('cancel-btn');
            if (cancelBtn) cancelBtn.addEventListener('click', cancelAppointment);
        });

        // Load doctor's appointments
        async function loadDoctorAppointments() {
            try {
                const user = getUser();
                if (!user || user.role !== 'doctor') {
                    window.location.href = 'login.html';
                    return;
                }

                const response = await fetch('http://localhost:3000/api/doctor/appointments', {
                    headers: {
                        'Authorization': `Bearer ${user.token}`
                    }
                });

                if (response.ok) {
                    appointments = await response.json();
                    displayAppointments(appointments);
                } else {
                    showError('Không thể tải danh sách lịch hẹn');
                }
            } catch (error) {
                console.error('Error loading appointments:', error);
                showError('Lỗi kết nối mạng');
            }
        }

        // Display appointments based on filter
        function displayAppointments(appointmentsList) {
            const container = document.getElementById('appointments-list');
            container.innerHTML = '';

            if (appointmentsList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar-times"></i>
                        <h3>Không có lịch hẹn nào</h3>
                        <p>Chưa có bệnh nhân đặt lịch hẹn với bạn</p>
                    </div>
                `;
                return;
            }

            appointmentsList.forEach(appointment => {
                const appointmentCard = createAppointmentCard(appointment);
                container.appendChild(appointmentCard);
            });
        }

        // Create appointment card
        function createAppointmentCard(appointment) {
            const card = document.createElement('div');
            card.className = `appointment-card ${appointment.status}`;
            card.onclick = () => showAppointmentDetails(appointment);

            const statusText = {
                'pending': 'Chờ xác nhận',
                'confirmed': 'Đã xác nhận',
                'completed': 'Đã hoàn thành',
                'cancelled': 'Đã hủy'
            };

            const statusClass = {
                'pending': 'status-pending',
                'confirmed': 'status-confirmed',
                'completed': 'status-completed',
                'cancelled': 'status-cancelled'
            };

            card.innerHTML = `
                <div class="appointment-header">
                    <div class="patient-info">
                        <h4>${appointment.patient_name}</h4>
                        <p><i class="fas fa-envelope"></i> ${appointment.patient_email}</p>
                        <p><i class="fas fa-phone"></i> ${appointment.patient_phone || 'Chưa cập nhật'}</p>
                    </div>
                    <div class="appointment-status ${statusClass[appointment.status]}">
                        ${statusText[appointment.status]}
                    </div>
                </div>
                <div class="appointment-details">
                    <div class="detail-item">
                        <i class="fas fa-calendar"></i>
                        <span>${new Date(appointment.appointment_date).toLocaleDateString('vi-VN')}</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-clock"></i>
                        <span>${appointment.appointment_time}</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-stethoscope"></i>
                        <span>${appointment.specialty_name}</span>
                    </div>
                </div>
                <div class="appointment-note">
                    <strong>Lý do khám:</strong> ${appointment.reason || 'Không có ghi chú'}
                </div>
            `;

            return card;
        }

        // Filter appointments
        function filterAppointments(filter) {
            currentFilter = filter;

            // Update active button
            document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            let filteredAppointments = appointments;
            if (filter !== 'all') {
                filteredAppointments = appointments.filter(app => app.status === filter);
            }

            displayAppointments(filteredAppointments);
        }

        // Show appointment details modal
        function showAppointmentDetails(appointment) {
            const modal = document.getElementById('appointment-modal');
            const details = document.getElementById('appointment-details');
            const confirmBtn = document.getElementById('confirm-btn');
            const cancelBtn = document.getElementById('cancel-btn');

            details.innerHTML = `
                <div class="appointment-detail-section">
                    <h4>Thông tin bệnh nhân</h4>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <label>Họ tên:</label>
                            <span>${appointment.patient_name}</span>
                        </div>
                        <div class="detail-item">
                            <label>Email:</label>
                            <span>${appointment.patient_email}</span>
                        </div>
                        <div class="detail-item">
                            <label>Số điện thoại:</label>
                            <span>${appointment.patient_phone || 'Chưa cập nhật'}</span>
                        </div>
                        <div class="detail-item">
                            <label>Ngày sinh:</label>
                            <span>${appointment.patient_dob ? new Date(appointment.patient_dob).toLocaleDateString('vi-VN') : 'Chưa cập nhật'}</span>
                        </div>
                    </div>
                </div>

                <div class="appointment-detail-section">
                    <h4>Thông tin lịch hẹn</h4>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <label>Ngày hẹn:</label>
                            <span>${new Date(appointment.appointment_date).toLocaleDateString('vi-VN')}</span>
                        </div>
                        <div class="detail-item">
                            <label>Giờ hẹn:</label>
                            <span>${appointment.appointment_time}</span>
                        </div>
                        <div class="detail-item">
                            <label>Chuyên khoa:</label>
                            <span>${appointment.specialty_name}</span>
                        </div>
                        <div class="detail-item">
                            <label>Trạng thái:</label>
                            <span class="status-${appointment.status}">${getStatusText(appointment.status)}</span>
                        </div>
                    </div>
                </div>

                <div class="appointment-detail-section">
                    <h4>Lý do khám</h4>
                    <p>${appointment.reason || 'Không có ghi chú'}</p>
                </div>

                ${appointment.notes ? `
                <div class="appointment-detail-section">
                    <h4>Ghi chú bổ sung</h4>
                    <p>${appointment.notes}</p>
                </div>
                ` : ''}
            `;

            // Show/hide buttons based on status
            if (appointment.status === 'pending') {
                confirmBtn.style.display = 'inline-block';
                cancelBtn.style.display = 'inline-block';
            } else {
                confirmBtn.style.display = 'none';
                cancelBtn.style.display = 'none';
            }

            // Store appointment ID for actions
            modal.dataset.appointmentId = appointment.id;

            modal.style.display = 'block';
        }

        // Close modal
        function closeModal() {
            document.getElementById('appointment-modal').style.display = 'none';
        }

        // Confirm appointment
        async function confirmAppointment() {
            const modal = document.getElementById('appointment-modal');
            const appointmentId = modal.dataset.appointmentId;

            try {
                const user = getUser();
                const response = await fetch(`http://localhost:3000/api/appointments/${appointmentId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${user.token}`
                    },
                    body: JSON.stringify({ status: 'confirmed' })
                });

                if (response.ok) {
                    showSuccess('Đã xác nhận lịch hẹn');
                    closeModal();
                    loadDoctorAppointments();
                } else {
                    showError('Không thể xác nhận lịch hẹn');
                }
            } catch (error) {
                console.error('Error confirming appointment:', error);
                showError('Lỗi kết nối mạng');
            }
        }

        // Cancel appointment
        async function cancelAppointment() {
            if (!confirm('Bạn có chắc muốn hủy lịch hẹn này?')) return;

            const modal = document.getElementById('appointment-modal');
            const appointmentId = modal.dataset.appointmentId;

            try {
                const user = getUser();
                const response = await fetch(`http://localhost:3000/api/appointments/${appointmentId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${user.token}`
                    },
                    body: JSON.stringify({ status: 'cancelled' })
                });

                if (response.ok) {
                    showSuccess('Đã hủy lịch hẹn');
                    closeModal();
                    loadDoctorAppointments();
                } else {
                    showError('Không thể hủy lịch hẹn');
                }
            } catch (error) {
                console.error('Error cancelling appointment:', error);
                showError('Lỗi kết nối mạng');
            }
        }

        // Helper functions
        function getStatusText(status) {
            const statusMap = {
                'pending': 'Chờ xác nhận',
                'confirmed': 'Đã xác nhận',
                'completed': 'Đã hoàn thành',
                'cancelled': 'Đã hủy'
            };
            return statusMap[status] || status;
        }

        function showError(message) {
            // Simple error display - you can enhance this
            alert('Lỗi: ' + message);
        }

        function showSuccess(message) {
            // Simple success display - you can enhance this
            alert('Thành công: ' + message);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('appointment-modal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>

    <style>
        :root {
            --primary: #0066cc;
            --primary-dark: #0052a3;
            --primary-light: #e3f2fd;
            --success: #66bb6a;
            --warning: #ffa726;
            --danger: #ef5350;
            --info: #26a69a;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --bg: #f5f7fa;
            --border: #e8eaed;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
        }

        .appointments-section {
            margin-top: 3rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .section-header h2 {
            margin: 0;
            color: var(--text);
            font-size: 1.8rem;
            font-weight: 700;
        }

        .filter-buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn-filter {
            padding: 0.6rem 1.2rem;
            border: 2px solid var(--border);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .btn-filter.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .btn-filter:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0,102,204,0.15);
        }

        .appointments-list {
            display: grid;
            gap: 1.5rem;
        }

        .appointment-card {
            background: white;
            border-radius: 12px;
            padding: 1.8rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 5px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .appointment-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--info));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .appointment-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .appointment-card:hover::before {
            opacity: 1;
        }

        .appointment-card.pending {
            border-left-color: var(--warning);
        }

        .appointment-card.confirmed {
            border-left-color: var(--success);
        }

        .appointment-card.completed {
            border-left-color: var(--info);
        }

        .appointment-card.cancelled {
            border-left-color: var(--danger);
        }

        .appointment-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .patient-info h4 {
            margin: 0 0 0.75rem 0;
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .patient-info p {
            margin: 0.4rem 0;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .patient-info i {
            margin-right: 0.5rem;
            color: var(--primary);
        }

        .appointment-status {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending {
            background: linear-gradient(135deg, #fff8e1 0%, #ffe082 100%);
            color: #f57c00;
        }

        .status-confirmed {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: #2e7d32;
        }

        .status-completed {
            background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%);
            color: #00695c;
        }

        .status-cancelled {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: #c62828;
        }

        .appointment-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--text);
            padding: 0.8rem;
            background: var(--bg);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .detail-item:hover {
            background: var(--primary-light);
            transform: translateX(2px);
        }

        .detail-item i {
            width: 20px;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .appointment-note {
            background: linear-gradient(135deg, var(--bg) 0%, #f0f4f8 100%);
            padding: 1.2rem;
            border-radius: 8px;
            color: var(--text);
            border-left: 4px solid var(--primary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
            opacity: 0.3;
        }

        .empty-state h3 {
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 16px 16px 0 0;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .modal-close {
            font-size: 1.8rem;
            cursor: pointer;
            color: white;
            transition: transform 0.2s ease;
        }

        .modal-close:hover {
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 2rem;
            max-height: 65vh;
            overflow-y: auto;
        }

        .modal-body::-webkit-scrollbar {
            width: 6px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: var(--bg);
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .modal-footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            background: var(--bg);
            border-radius: 0 0 16px 16px;
        }

        .appointment-detail-section {
            margin-bottom: 2rem;
        }

        .appointment-detail-section h4 {
            margin: 0 0 1.2rem 0;
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 600;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.2rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 1rem;
            background: var(--bg);
            border-radius: 8px;
        }

        .detail-item label {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-item span {
            color: var(--text);
            font-size: 0.95rem;
        }

        .status-pending, .status-confirmed, .status-completed, .status-cancelled {
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .section-header {
                flex-direction: column;
                gap: 1.5rem;
                align-items: stretch;
            }

            .filter-buttons {
                justify-content: flex-start;
            }

            .appointment-header {
                flex-direction: column;
                gap: 1rem;
            }

            .appointment-details {
                grid-template-columns: 1fr;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }

            .modal-footer {
                flex-direction: column;
            }

            .modal-footer button {
                width: 100%;
            }

            .modal-content {
                margin: 20% auto;
            }
        }
    </style>
</body>
</html>
