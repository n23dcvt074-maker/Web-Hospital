<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý chuyên khoa - WebHopital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0066cc;
            --primary-dark: #0052a3;
            --primary-light: #e3f2fd;
            --success: #66bb6a;
            --warning: #ffa726;
            --danger: #ef5350;
            --info: #26a69a;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --bg: #f5f7fa;
            --border: #e8eaed;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
        }

        .admin-specialties-section {
            margin-top: 3rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .section-header h2 {
            margin: 0;
            color: var(--text);
            font-size: 1.8rem;
            font-weight: 700;
        }

        .btn-primary {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .specialties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .specialty-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .specialty-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--info));
        }

        .specialty-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .specialty-icon {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 1.5rem;
        }

        .specialty-name {
            text-align: center;
            margin: 0 0 0.5rem 0;
            color: var(--text);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .specialty-description {
            text-align: center;
            margin: 0 0 1.5rem 0;
            color: var(--text-light);
            font-size: 0.9rem;
            line-height: 1.5;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .specialty-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            padding: 1rem;
            background: var(--primary-light);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .specialty-stat {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .specialty-stat-value {
            color: var(--primary);
            font-size: 1.3rem;
            font-weight: 700;
        }

        .specialty-stat-label {
            color: var(--text-light);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .specialty-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }

        .btn-action {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .btn-edit {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            color: var(--primary);
        }

        .btn-edit:hover {
            background: linear-gradient(135deg, #bbdefb 0%, #90caf9 100%);
            transform: scale(1.05);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: var(--danger);
        }

        .btn-delete:hover {
            background: linear-gradient(135deg, #ffcdd2 0%, #ef9a9a 100%);
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
            opacity: 0.3;
        }

        .empty-state h3 {
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 16px 16px 0 0;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .modal-close {
            font-size: 1.8rem;
            cursor: pointer;
            color: white;
            transition: transform 0.2s ease;
        }

        .modal-close:hover {
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 2rem;
            max-height: 65vh;
            overflow-y: auto;
        }

        .modal-body::-webkit-scrollbar {
            width: 6px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: var(--bg);
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .modal-footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            background: var(--bg);
            border-radius: 0 0 16px 16px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: white;
            color: var(--text);
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .btn-secondary {
            padding: 0.75rem 1.5rem;
            background: var(--border);
            color: var(--text);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        @media (max-width: 768px) {
            .section-header {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-primary {
                width: 100%;
                justify-content: center;
            }

            .specialties-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1.5rem;
            }

            .specialty-icon {
                width: 80px;
                height: 80px;
                font-size: 2rem;
            }

            .modal-content {
                margin: 20% auto;
                width: 95%;
            }

            .modal-footer {
                flex-direction: column;
            }

            .modal-footer button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-hospital"></i>
                <span>WebHopital</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Trang chủ</a>
                <a href="doctors.html" class="nav-link">Bác sĩ</a>
                <a href="about.html" class="nav-link">Giới thiệu</a>
                <div class="nav-auth">
                    <button class="btn-login" id="userMenuBtn">
                        <i class="fas fa-user-circle"></i> Tài khoản
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-stethoscope"></i> Quản lý chuyên khoa</h1>
            <p>Quản lý các chuyên khoa của bệnh viện</p>
        </div>

        <div class="admin-section">
            <div class="section-header">
                <h2>Danh sách chuyên khoa</h2>
                <button class="btn-primary" id="addSpecialtyBtn">
                    <i class="fas fa-plus"></i> Thêm chuyên khoa
                </button>
            </div>

            <div id="specialties-grid" class="specialties-grid">
                <!-- Specialties will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Specialty Modal -->
    <div id="specialty-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Thêm chuyên khoa mới</h3>
                <span class="modal-close" id="modalCloseBtn">&times;</span>
            </div>
            <form id="specialty-form" class="modal-body">
                <div class="form-group">
                    <label for="specialty-name">Tên chuyên khoa *</label>
                    <input type="text" id="specialty-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="specialty-description">Mô tả</label>
                    <textarea id="specialty-description" name="description" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label for="specialty-icon">Biểu tượng (CSS class)</label>
                    <input type="text" id="specialty-icon" name="icon" placeholder="e.g., fas fa-heart">
                </div>
            </form>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" id="modalCancelBtn">Hủy</button>
                <button type="button" class="btn-primary" id="modalSaveBtn">Lưu</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userBtn = document.getElementById('userMenuBtn'); if (userBtn) userBtn.addEventListener('click', showUserMenu);
            const addBtn = document.getElementById('addSpecialtyBtn'); if (addBtn) addBtn.addEventListener('click', showAddSpecialtyModal);
            const modalClose = document.getElementById('modalCloseBtn'); if (modalClose) modalClose.addEventListener('click', closeModal);
            const modalCancel = document.getElementById('modalCancelBtn'); if (modalCancel) modalCancel.addEventListener('click', closeModal);
            const modalSave = document.getElementById('modalSaveBtn'); if (modalSave) modalSave.addEventListener('click', saveSpecialty);

            // delegation for edit/delete buttons inside table rows
            document.getElementById('specialties-table-container').addEventListener('click', function(e) {
                const edit = e.target.closest('.btn-edit');
                const del = e.target.closest('.btn-delete');
                if (edit) {
                    e.stopPropagation();
                    const id = edit.dataset.id;
                    if (id) editSpecialty(id);
                }
                if (del) {
                    e.stopPropagation();
                    const id = del.dataset.id;
                    if (id) deleteSpecialty(id);
                }
            });
        });
    </script>
    <script>
        let specialties = [];
        const defaultSpecialties = [
            { id: 1, name: 'Tim mạch', description: 'Chuyên khoa về bệnh tim mạch và hệ tuần hoàn', icon: 'fas fa-heart' },
            { id: 2, name: 'Tai mũi họng', description: 'Chuyên khoa về tai, mũi, họng', icon: 'fas fa-ear' },
            { id: 3, name: 'Nội tổng quát', description: 'Khám nội khoa tổng quát', icon: 'fas fa-stethoscope' },
            { id: 4, name: 'Phụ khoa', description: 'Chuyên khoa sản phụ khoa', icon: 'fas fa-baby' },
            { id: 5, name: 'Nhi khoa', description: 'Chuyên khoa nhi khoa', icon: 'fas fa-child' },
            { id: 6, name: 'Chỉnh hình', description: 'Chuyên khoa chỉnh hình', icon: 'fas fa-bone' },
            { id: 7, name: 'Hóa học lâm sàng', description: 'Xét nghiệm hóa học lâm sàng', icon: 'fas fa-flask' },
            { id: 8, name: 'Mắt', description: 'Chuyên khoa mắt', icon: 'fas fa-eye' },
            { id: 9, name: 'Ngoại khoa', description: 'Phẫu thuật ngoại khoa', icon: 'fas fa-scalpel' },
            { id: 10, name: 'Da liễu', description: 'Chuyên khoa da liễu', icon: 'fas fa-spa' },
        ];

        document.addEventListener('DOMContentLoaded', function() {
            updateNavbarAuth();
            loadSpecialties();
        });

        async function loadSpecialties() {
            try {
                const user = getUser();
                console.log('Current user:', user); // Debug log

                if (!user) {
                    console.log('No user found, redirecting to login');
                    window.location.href = 'login.html';
                    return;
                }

                if (user.role !== 'admin') {
                    console.log('User is not admin, redirecting to login');
                    window.location.href = 'login.html';
                    return;
                }

                // Load specialties từ backend hoặc sử dụng default
                specialties = defaultSpecialties;
                console.log('Loading specialties:', specialties); // Debug log
                displaySpecialties(specialties);
            } catch (error) {
                console.error('Error loading specialties:', error);
                showError('Lỗi kết nối mạng');
                // Fallback: load default specialties
                specialties = defaultSpecialties;
                displaySpecialties(specialties);
            }
        }

        function displaySpecialties(specialtiesList) {
            const container = document.getElementById('specialties-grid');
            container.innerHTML = '';

            if (specialtiesList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-stethoscope"></i>
                        <h3>Chưa có chuyên khoa nào</h3>
                        <p>Hãy thêm chuyên khoa đầu tiên</p>
                    </div>
                `;
                return;
            }

            specialtiesList.forEach(specialty => {
                const card = document.createElement('div');
                card.className = 'specialty-card';
                card.onclick = () => editSpecialty(specialty.id);
                card.innerHTML = `
                    <div class="specialty-icon">
                        <i class="${specialty.icon}"></i>
                    </div>
                    <h3 class="specialty-name">${specialty.name}</h3>
                    <p class="specialty-description">${specialty.description || ''}</p>
                    <div class="specialty-actions">
                        <button class="btn-edit" data-id="${specialty.id}">
                            <i class="fas fa-edit"></i> Sửa
                        </button>
                        <button class="btn-delete" data-id="${specialty.id}">
                            <i class="fas fa-trash"></i> Xóa
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showAddSpecialtyModal() {
            document.getElementById('modal-title').textContent = 'Thêm chuyên khoa mới';
            document.getElementById('specialty-form').reset();
            document.getElementById('specialty-modal').style.display = 'block';
        }

        function editSpecialty(specialtyId) {
            const specialty = specialties.find(s => s.id === specialtyId);
            if (!specialty) return;

            document.getElementById('modal-title').textContent = 'Chỉnh sửa chuyên khoa';
            document.getElementById('specialty-name').value = specialty.name;
            document.getElementById('specialty-description').value = specialty.description || '';
            document.getElementById('specialty-icon').value = specialty.icon || '';

            document.getElementById('specialty-form').dataset.specialtyId = specialtyId;
            document.getElementById('specialty-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('specialty-modal').style.display = 'none';
        }

        function saveSpecialty() {
            const form = document.getElementById('specialty-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const name = document.getElementById('specialty-name').value;
            const description = document.getElementById('specialty-description').value;
            const icon = document.getElementById('specialty-icon').value || 'fas fa-stethoscope';

            showSuccess('Chuyên khoa đã được lưu');
            closeModal();
            // Reload specialties
            loadSpecialties();
        }

        function deleteSpecialty(specialtyId) {
            if (!confirm('Bạn có chắc muốn xóa chuyên khoa này?')) return;
            showSuccess('Chuyên khoa đã được xóa');
            loadSpecialties();
        }

        function showError(message) {
            alert('Lỗi: ' + message);
        }

        function showSuccess(message) {
            alert('Thành công: ' + message);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('specialty-modal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
